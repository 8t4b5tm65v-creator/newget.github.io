<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Hindu — Delhi Edition</title>
  <script>
    (function() {
      var s = localStorage.getItem('ng-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (s === 'light') document.documentElement.classList.remove('dark');
      else if (!s && !prefersDark) document.documentElement.classList.remove('dark');
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111110;
      --surface:   #1c1b19;
      --surface-h: #232220;
      --border:    #2e2c28;
      --ink:       #e8e4dc;
      --muted:     #7a7670;
      --hindu:     #c0392b;
      --hindu-h:   #a93226;
      --hindu-dim: rgba(192,57,43,0.15);
    }

    html:not(.dark) {
      --bg:        #f5f3ef;
      --surface:   #ffffff;
      --surface-h: #f9f7f4;
      --border:    #d8d4cc;
      --ink:       #1a1a18;
      --muted:     #918d85;
      --hindu:     #c0392b;
      --hindu-h:   #a93226;
      --hindu-dim: rgba(192,57,43,0.07);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.25s, color 0.25s;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 4rem;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .back {
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back:hover { color: var(--ink); }

    /* ── Theme toggle ── */
    .toggle-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .theme-btn {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      position: relative;
      transition: background 0.25s, border-color 0.25s;
      padding: 0;
    }
    .theme-btn::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.25s, background 0.25s;
    }
    html.dark .theme-btn::after {
      transform: translateX(16px);
      background: var(--ink);
    }
    .toggle-text {
      font-family: system-ui, sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s;
    }

    /* ── Masthead ── */
    .masthead {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      transition: border-color 0.25s;
    }
    .pub-eyebrow {
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hindu);
      margin-bottom: 0.5rem;
    }
    .wordmark {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1.1;
      transition: color 0.25s;
    }
    .edition-sub {
      margin-top: 0.4rem;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s;
    }

    /* ── Last updated ── */
    .last-updated {
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
      transition: color 0.25s;
    }
    .last-updated strong {
      color: var(--ink);
      font-weight: 400;
      transition: color 0.25s;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .download-btn {
      display: inline-block;
      padding: 0.7em 1.6em;
      background: var(--hindu);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-family: system-ui, sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .download-btn:hover { background: var(--hindu-h); }

    .read-btn {
      display: inline-block;
      padding: 0.7em 1.6em;
      background: var(--hindu-dim);
      color: var(--hindu);
      text-decoration: none;
      border-radius: 4px;
      font-family: system-ui, sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      border: 1px solid var(--hindu);
      transition: background 0.15s;
    }
    html:not(.dark) .read-btn { color: #a02820; border-color: #a02820; }
    .read-btn:hover { background: rgba(192,57,43,0.22); }

    /* ── Divider + note ── */
    .rule {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 1.5rem;
      transition: border-color 0.25s;
    }
    .note {
      font-family: system-ui, sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      transition: color 0.25s;
    }
    .note strong {
      font-weight: 500;
      color: var(--ink);
      transition: color 0.25s;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">
      <a class="back" href="https://BRDSLYR.github.io/NewsGet/">&#8592; NewsGet</a>
      <label class="toggle-label" aria-label="Toggle light/dark mode">
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme"></button>
        <span class="toggle-text" id="toggle-text">Dark</span>
      </label>
    </div>

    <div class="masthead">
      <div class="pub-eyebrow">The Hindu</div>
      <div class="wordmark">Delhi Edition</div>
      <div class="edition-sub">Updated daily at 07:00 IST</div>
    </div>

    <p class="last-updated">Last updated: <strong>{{LAST_UPDATED}}</strong></p>

    <div class="btn-row">
      <a class="download-btn"
         href="https://BRDSLYR.github.io/NewsGet/hindu-delhi/hindu-delhi-latest.epub"
         download="The Hindu - Delhi - {{LAST_UPDATED}}.epub">
        Download EPUB
      </a>
      <a class="read-btn"
         href="https://BRDSLYR.github.io/NewsGet/hindu-delhi/hindu-delhi-latest.html">
        Read Online
      </a>
    </div>

    <hr class="rule"/>
    <p class="note">To read on iPhone: tap <strong>Download EPUB</strong>, then tap <strong>Share &rarr; Copy to Books</strong> (or open in your preferred EPUB reader).</p>

  </div>

  <script>
    function syncLabel() {
      var dark = document.documentElement.classList.contains('dark');
      document.getElementById('toggle-text').textContent = dark ? 'Dark' : 'Light';
    }
    function toggleTheme() {
      var dark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ng-theme', dark ? 'dark' : 'light');
      syncLabel();
    }
    syncLabel();
  </script>
</body>
</html>
